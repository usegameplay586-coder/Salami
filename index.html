<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>সামি ভাইয়ের ঈদের সালামি</title><style>

body{
font-family:sans-serif;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
text-align:center;
padding:20px;
}

.container{
background:white;
max-width:420px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input,select{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#2a9d8f;
color:white;
border:none;
padding:14px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.pointer{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:30px solid red;
margin:auto;
}

#wheel{
width:260px;
height:260px;
border-radius:50%;
margin:20px auto;
transition:transform 5s ease-out;

background:conic-gradient(
#ff4d4d 0deg 51deg,
#ffd84d 51deg 102deg,
#66ff66 102deg 153deg,
#4dd2ff 153deg 204deg,
#b84dff 204deg 255deg,
#ff66cc 255deg 306deg,
#4d79ff 306deg 360deg
);
}

#walletPage{
display:none;
}

</style></head><body><div class="container" id="spinPage"><h2>🎉 সামি ভাইয়ের ঈদের সালামি</h2><input id="name" placeholder="আপনার নাম">
<input id="number" placeholder="বিকাশ / নগদ নাম্বার"><div class="pointer"></div><div id="wheel"></div><button onclick="spin()">🎡 স্পিন করুন</button>

<h3 id="balance">Wallet: 0৳</h3><button onclick="openWallet()">👛 Wallet</button>

</div><div class="container" id="walletPage"><h2>👛 Wallet</h2><h3 id="walletBalance">Balance: 0৳</h3><select id="method">
<option>Bkash</option>
<option>Nagad</option>
<option>Rocket</option>
<option>Recharge</option>
</select><button onclick="withdraw()">Withdraw</button>

<br><br>

<button onclick="back()">⬅ Back</button>

</div><script>

let prizes=[50,80,100,150,200,300,400];
let rotation=0;
let wallet=0;

let adminNumber="5725";

function spin(){

let number=document.getElementById("number").value;

if(number!==adminNumber){
if(localStorage.getItem("spin_done")=="yes"){
alert("আপনি ইতিমধ্যেই সালামির জন্য রিকোয়েস্ট দিয়ে দিয়েছেন।");
return;
}
}

let name=document.getElementById("name").value;

if(name=="" || number==""){
alert("নাম এবং নাম্বার দিন");
return;
}

/* PROBABILITY SYSTEM */

let rand=Math.random()*100;
let index;

if(rand<40){
index=0;
}
else if(rand<65){
index=1;
}
else if(rand<80){
index=2;
}
else if(rand<90){
index=3;
}
else if(rand<95){
index=4;
}
else if(rand<98){
index=5;
}
else{
index=6;
}

let winAmount=prizes[index];

wallet+=winAmount;

let slice=360/prizes.length;
let stopAngle=(360-(index*slice)-(slice/2));

rotation+=360*5+stopAngle;

document.getElementById("wheel").style.transform="rotate("+rotation+"deg)";

setTimeout(function(){

alert("🎉 অভিনন্দন! আপনি সামি ভাইয়ের কাছ থেকে ঈদের "+winAmount+"৳ সালামি পেয়েছেন।");

document.getElementById("balance").innerHTML="Wallet: "+wallet+"৳";

if(number!==adminNumber){
localStorage.setItem("spin_done","yes");
}

},5000);

}

function openWallet(){

document.getElementById("spinPage").style.display="none";
document.getElementById("walletPage").style.display="block";

document.getElementById("walletBalance").innerHTML="Balance: "+wallet+"৳";

}

function back(){

document.getElementById("walletPage").style.display="none";
document.getElementById("spinPage").style.display="block";

}

function withdraw(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let method=document.getElementById("method").value;

let message =
"🧧 New Withdraw Request\n\n"+
"👤 Name: "+name+"\n"+
"📱 Number: "+number+"\n"+
"💳 Method: "+method+"\n"+
"💰 Amount: "+wallet+"৳";

let token="8661084474:AAGHrVkPP2J-ghzJaCGSepvgiGN-INh0NLc";
let chat_id="7044949311";

let url="https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat_id+"&text="+encodeURIComponent(message);

fetch(url);

alert("সামি ভাইয়ের থেকে পাওয়া সালামিটি আপনার দেওয়া নাম্বারে ২ ঘন্টার মধ্যে চলে যাবে।");

wallet=0;

document.getElementById("walletBalance").innerHTML="Balance: 0৳";
document.getElementById("balance").innerHTML="Wallet: 0৳";

}

</script></body>
</html>
